<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; font-family: system-ui; padding: 16px; margin: 0; background: #1a1a2e; color: #e0e0f0; }
    h3   { margin: 0 0 16px; font-size: 15px; letter-spacing: .5px; }

    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; font-size: 13px; }

    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #444; border-radius: 22px; cursor: pointer; transition: .2s; }
    .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #27ae60; }
    input:checked + .slider:before { transform: translateX(18px); }

    .status { font-size: 11px; color: #27ae60; margin-top: 4px; }
    .status.paused { color: #e67e22; }
    hr { border-color: #333; margin: 12px 0; }
  </style>
</head>
<body>
  <h3>🛡 IntentShield</h3>

  <div class="row">
    <span>Enable protection</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <div class="row">
    <span>Pause on this site</span>
    <label class="switch">
      <input type="checkbox" id="toggle-pause">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status-text">Active on this site</div>

  <script src="popup.js"></script>
</body>
</html>
